<style>

  /* HEADER */
  header {
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--border);
    position: relative;

    content: '';

    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .event-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 4vw, 40px);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .event-subtitle {
    font-size: 15px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 0.15em;

    font-weight: 300;
  }
  .social-links {
    display: flex;

    align-items: center;
    gap: 10px;
    margin-top: 16px;
  }
  .social-link {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    text-decoration: none;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .social-link:hover { color: var(--text); }

  .social-link.discord:hover { border-color: #5865f2; color: #5865f2; }
  .social-icon { width: 15px; height: 15px; flex-shrink: 0; }

  /* NAV */
  nav {
    display: flex;
    justify-content: center;
    gap: 2px;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 20px;
    background: none;
    border: 1px solid transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); border-color: var(--border); }
  .tab.active { color: var(--gold); border-color: var(--border-bright); background: rgba(201,168,76,0.05); }

  /* MAIN */
  main { max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }

  .page { display: none; }
  .page.active { display: block; }

  /* LEADERBOARD */
  .lb-header {
    display: grid;
    grid-template-columns: 40px 1fr 80px 80px 80px 80px;
    gap: 12px;
    padding: 0 16px 10px;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .lb-row {
    display: grid;
    grid-template-columns: 40px 1fr 80px 80px 80px 80px;
    gap: 12px;
    align-items: center;
    padding: 14px 16px;
    border: 1px solid transparent;
    border-radius: 4px;
    margin-bottom: 4px;
    transition: all 0.2s;
    cursor: default;
  }
  .lb-row:hover { border-color: var(--border); background: var(--bg2); }
  .lb-row.rank-1 { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.04); }
  .lb-row.rank-2 { border-color: rgba(180,180,180,0.3); background: rgba(180,180,180,0.02); }
  .lb-row.rank-3 { border-color: rgba(180,120,60,0.3); background: rgba(180,120,60,0.02); }
  .rank-num {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
  }
  .rank-1 .rank-num { color: var(--gold); }
  .rank-2 .rank-num { color: #b4b4b4; }
  .rank-3 .rank-num { color: #b4783c; }
  .player-name {
    font-size: 17px;
    font-weight: 400;
  }
  .score-total {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold);
    text-align: right;
  }
  .score-base, .score-bonus, .hf-count {
    font-size: 15px;
    color: var(--text-dim);
    text-align: right;
  }
  .score-bonus { color: var(--teal); }

  .lb-row.open .lb-detail { display: block; }
  .lb-row { cursor: pointer; }
  .lb-row .player-name::after { content: ' \25B8'; font-size: 10px; color: var(--text-dim); opacity: 0.5; }
  .lb-row.open .player-name::after { content: ' \25BE'; }
  .dungeon-section { margin-bottom: 16px; }

  .dp-name { color: var(--text-dim); font-family: 'Cinzel', serif; letter-spacing: 0.08em; text-transform: uppercase; }
  .dp-count { color: var(--gold-dim); }
  .dp-count.complete { color: var(--teal); }

  .hf-check-icon { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }

  }

    text-transform: uppercase;
    color: var(--gold);

    border-bottom: 1px solid var(--border);

    align-items: center;

    padding-top: 10px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1.6;
    font-style: italic;
  }
  .hf-card.open .hf-card-desc { display: block; }
  .hf-card-title::after { content: ' \25B8'; font-size: 10px; color: var(--text-dim); opacity: 0.4; }
  .hf-card.open .hf-card-title::after { content: ' \25BE'; }

    padding: 1px 6px;
    border-radius: 20px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
  }

  .admin-toolbar {

    transition: all 0.15s;

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);

    padding: 12px 20px;
    border-radius: 4px;
    font-size: 14px;
    opacity: 0;

    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* LOADING */
  .loading { text-align: center; padding: 48px; color: var(--text-dim); font-style: italic; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .lb-header, .lb-row {

</style>

// ---- UTILS ----
function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 3000);
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'leaderboard') loadLeaderboard();
  if (id === 'achievements') renderAchievements();
}

// ---- SUPABASE FETCH ----
async function sbFetch(path, key, opts={}) {
  const url = (SUPABASE_URL === 'REMPLACE_PAR_TON_URL' ? adminUrl : SUPABASE_URL) + path;
  const apiKey = key || SUPABASE_ANON_KEY;
  const res = await fetch(url, {
    headers: {
      'apikey': apiKey,
      'Authorization': 'Bearer ' + apiKey,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
      ...opts.headers
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  if (res.status === 204) return null;
  return res.json();
}

// ---- SCORE CALCULATION (côté client) ----
function computeScores(players, completions) {
  // completions: [{player_id, achievement_id}]
  const byPlayer = {};
  players.forEach(p => byPlayer[p.id] = new Set());
  completions.forEach(c => {
    if (byPlayer[c.player_id]) byPlayer[c.player_id].add(c.achievement_id);
  });

  return players.map(p => {
    const done = byPlayer[p.id];
    let base = 0;
    done.forEach(aid => {
      const a = ACHIEVEMENTS.find(x => x.id === aid);
      if (a) base += a.points;
    });
    // Bonus par donjon
    let bonus = 0;
    DUNGEONS_ORDER.forEach(d => {
      const dungeonHFs = ACHIEVEMENTS.filter(a => a.dungeon === d);
      if (dungeonHFs.every(a => done.has(a.id))) bonus += 5;
    });
    return {
      id: p.id,
      name: p.name,
      base,
      bonus,
      total: base + bonus,
      hf_count: done.size,
      done
    };
  }).sort((a, b) => b.total - a.total);
}

// ---- LEADERBOARD ----
let lbData = null;

async function loadLeaderboard() {
  if (SUPABASE_URL === 'REMPLACE_PAR_TON_URL') {
    document.getElementById('lb-content').innerHTML = '<div class="loading">Configure ton URL Supabase dans le fichier HTML pour voir les données en direct.</div>';
    return;
  }
  document.getElementById('lb-content').innerHTML = '<div class="loading">Chargement...</div>';
  try {
    const [players, completions] = await Promise.all([
      sbFetch('/rest/v1/players?select=id,name&order=name'),
      sbFetch('/rest/v1/player_achievements?select=player_id,achievement_id')
    ]);
    lbData = computeScores(players, completions);
    renderLeaderboard(lbData);
  } catch(e) {
    document.getElementById('lb-content').innerHTML = '<div class="loading">Erreur de chargement. Vérifie ta config Supabase.</div>';
  }
}

function renderLeaderboard(scores) {
  const rankIcons = ['I', 'II', 'III'];
  let html = `<div class="lb-header">
    <div></div><div>Joueur</div>
    <div class="col-base" style="text-align:right">Base</div>
    <div class="col-bonus" style="text-align:right">Bonus</div>
    <div style="text-align:right">HF</div>
    <div style="text-align:right">Total</div>
  </div>`;

  scores.forEach((s, i) => {
    const rankClass = i < 3 ? `rank-${i+1}` : '';
    const rankLabel = i < 3 ? `<span style="font-style:italic;font-size:11px">${rankIcons[i]}</span>` : `<span style="font-size:12px">${i+1}</span>`;

    // Detail: tous les HF par donjon, avec état
    let detailHtml = '<div class="lb-detail"><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 28px">';
    DUNGEONS_ORDER.forEach(d => {
      const dHFs = ACHIEVEMENTS.filter(a => a.dungeon === d);
      const dDone = dHFs.filter(a => s.done.has(a.id)).length;
      const complete = dDone === dHFs.length;
      detailHtml += `<div class="dungeon-section">
        <div class="dp-header">
          <span class="dp-name">${d}</span>
          <span class="dp-count ${complete ? 'complete' : ''}">${dDone}/${dHFs.length}${complete ? ' · +5pts' : ''}</span>
        </div>
        <div class="hf-list">`;
      dHFs.forEach(a => {
        const done = s.done.has(a.id);
        detailHtml += `<div class="hf-item ${done ? 'done' : ''}">
          <div class="hf-check-icon">${done ? '✓' : ''}</div>
          <span class="hf-item-name">${a.title}${a.hard ? ' ⭐' : ''}${a.personal ? ' 👤' : ''}</span>
          <span class="hf-item-pts">${done ? '+' + a.points : a.points} pts</span>
        </div>`;
      });
      detailHtml += '</div></div>';
    });
    detailHtml += '</div></div>';

    html += `<div class="lb-row ${rankClass}" onclick="this.classList.toggle('open')">
      <div class="rank-num">${rankLabel}</div>
      <div class="player-name">${s.name}</div>
      <div class="score-base col-base">${s.base}</div>
      <div class="score-bonus col-bonus">${s.bonus > 0 ? '+'+s.bonus : '—'}</div>
      <div class="hf-count">${s.hf_count}</div>
      <div class="score-total">${s.total}</div>
      ${detailHtml}
    </div>`;
  });

  document.getElementById('lb-content').innerHTML = html;
}

function renderAchievements() {
  let html = '';

      html += `<div class="hf-card" onclick="this.classList.toggle('open')">

          <span class="hf-card-title">${a.title}</span>
          <div class="hf-badges">

            ${a.personal ? '<span class="badge badge-personal">👤</span>' : ''}
            <span class="badge badge-pts">${a.points} pts</span>
          </div>
        </div>
        <div class="hf-card-desc">${a.desc}</div>
      </div>`;
    });
    html += `</div></div></div>`;
  });
  document.getElementById('ach-content').innerHTML = html;
}

// ---- ADMIN ----
let adminUrl = '';
let adminKey = '';
let adminPlayers = [];
let adminCurrentPlayer = null;
let adminCurrentDone = new Set();

function adminLogin() {
  adminUrl = document.getElementById('input-url').value.trim().replace(/\/$/, '');
  adminKey = document.getElementById('input-key').value.trim();
  if (!adminUrl || !adminKey) { toast('Remplis les deux champs', true); return; }
  loadAdminData();
}

async function loadAdminData() {
  try {
    adminPlayers = await sbFetch('/rest/v1/players?select=id,name&order=name', adminKey);
    const sel = document.getElementById('admin-player-select');
    sel.innerHTML = '<option value="">— Choisir un joueur —</option>';
    adminPlayers.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      sel.appendChild(opt);
    });
    document.getElementById('admin-gate').style.display = 'none';
    document.getElementById('admin-panel').classList.add('visible');
    toast('Connecté !');
  } catch(e) {
    toast('Erreur de connexion. Vérifie tes clés.', true);
  }
}

async function loadAdminPlayer() {
  const playerId = parseInt(document.getElementById('admin-player-select').value);
  if (!playerId) { document.getElementById('admin-hf-list').innerHTML = ''; return; }
  adminCurrentPlayer = playerId;

  try {
    const completions = await sbFetch(`/rest/v1/player_achievements?player_id=eq.${playerId}&select=achievement_id`, adminKey);
    adminCurrentDone = new Set(completions.map(c => c.achievement_id));
    renderAdminHFs();
  } catch(e) {
    toast('Erreur de chargement du joueur', true);
  }
}

function renderAdminHFs() {
  let html = '';
  DUNGEONS_ORDER.forEach(d => {
    const hfs = ACHIEVEMENTS.filter(a => a.dungeon === d);
    html += `<div class="admin-dungeon">
      <div class="admin-dungeon-title">${d}</div>`;
    hfs.forEach(a => {
      const checked = adminCurrentDone.has(a.id);
      html += `<div class="admin-hf-row">
        <div class="admin-hf-check ${checked ? 'checked' : ''}" onclick="toggleHF(${a.id}, this)"></div>
        <div class="admin-hf-info">
          <div class="admin-hf-name">${a.title} ${a.hard ? '⭐' : ''} ${a.personal ? '👤' : ''}</div>
          <div class="admin-hf-meta">${a.points} pts</div>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('admin-hf-list').innerHTML = html;
}

async function toggleHF(achievementId, el) {
  const isChecked = el.classList.contains('checked');
  el.style.pointerEvents = 'none';

  try {
    if (isChecked) {
      // Décocher
      await sbFetch(
        `/rest/v1/player_achievements?player_id=eq.${adminCurrentPlayer}&achievement_id=eq.${achievementId}`,
        adminKey,
        { method: 'DELETE', prefer: 'return=minimal' }
      );
      el.classList.remove('checked');
      adminCurrentDone.delete(achievementId);
    } else {
      // Cocher
      await sbFetch('/rest/v1/player_achievements', adminKey, {
        method: 'POST',
        prefer: 'return=minimal',
        body: { player_id: adminCurrentPlayer, achievement_id: achievementId }
      });
      el.classList.add('checked');
      adminCurrentDone.add(achievementId);
    }
    const ind = document.getElementById('save-indicator');
    ind.classList.add('show');
    clearTimeout(ind._t);
    ind._t = setTimeout(() => ind.classList.remove('show'), 2000);
  } catch(e) {
    toast('Erreur lors de la mise à jour', true);
  }
  el.style.pointerEvents = '';
}
