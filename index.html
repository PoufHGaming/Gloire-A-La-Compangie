<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloire à la Compagnie I</title>
<link rel="icon" type="image/png" href="images/pouf.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #9a7a3a;
    --bg: #0a0a0e;
    --bg2: #12121a;
    --bg3: #1c1c28;
    --border: rgba(201,168,76,0.2);
    --border-bright: rgba(201,168,76,0.5);
    --text: #e8e0d0;
    --text-dim: #b0a898;
    --text-muted: #706860;
    --red: #c94c4c;
    --teal: #4ca8a8;
    --purple: #9b7fea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-weight: 300;
    min-height: 100vh;
    font-size: 17px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .event-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 4vw, 40px);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .event-subtitle {
    font-size: 15px;
    color: var(--text);
    margin-top: 6px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 300;
    opacity: 0.65;
  }
  .social-links {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
  }
  .social-link {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    font-size: 12px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .social-link:hover { color: var(--text); border-color: var(--border-bright); }
  .social-link.twitch:hover { border-color: #9147ff; color: #9147ff; }
  .social-link.discord:hover { border-color: #5865f2; color: #5865f2; }
  .social-icon { width: 15px; height: 15px; flex-shrink: 0; }

  /* NAV */
  nav {
    display: flex;
    justify-content: center;
    gap: 2px;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 20px;
    background: none;
    border: 1px solid transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0.6;
  }
  .tab:hover { opacity: 1; border-color: var(--border); }
  .tab.active { color: var(--gold); border-color: var(--border-bright); background: rgba(201,168,76,0.05); opacity: 1; }

  /* MAIN */
  main { max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }

  .page { display: none; }
  .page.active { display: block; }

  /* LEADERBOARD */
  .lb-header {
    display: grid;
    grid-template-columns: 40px 1fr 80px 80px 80px 80px;
    gap: 12px;
    padding: 0 16px 10px;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .lb-row {
    display: grid;
    grid-template-columns: 40px 1fr 80px 80px 80px 80px;
    gap: 12px;
    align-items: center;
    padding: 14px 16px;
    border: 1px solid transparent;
    border-radius: 4px;
    margin-bottom: 4px;
    transition: all 0.2s;
    cursor: default;
  }
  .lb-row:hover { border-color: var(--border); background: var(--bg2); }
  .lb-row.rank-1 { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.04); }
  .lb-row.rank-2 { border-color: rgba(180,180,180,0.3); background: rgba(180,180,180,0.02); }
  .lb-row.rank-3 { border-color: rgba(180,120,60,0.3); background: rgba(180,120,60,0.02); }
  .rank-num {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
  }
  .rank-1 .rank-num { color: var(--gold); }
  .rank-2 .rank-num { color: #b4b4b4; }
  .rank-3 .rank-num { color: #b4783c; }
  .player-name {
    font-size: 17px;
    font-weight: 400;
  }
  .score-total {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold);
    text-align: right;
  }
  .score-base, .score-bonus, .hf-count {
    font-size: 15px;
    color: var(--text-dim);
    text-align: right;
  }
  .score-bonus { color: var(--teal); }

  /* PLAYER DETAIL IN LEADERBOARD */
  .lb-detail { display: none; padding: 16px 16px 20px 56px; grid-column: 1 / -1; }
  .lb-row.open .lb-detail { display: block; }
  .lb-row { cursor: pointer; }
  .lb-row .player-name::after { content: ' \25B8'; font-size: 10px; color: var(--text-dim); opacity: 0.5; }
  .lb-row.open .player-name::after { content: ' \25BE'; }
  .dungeon-section { margin-bottom: 16px; }
  .dp-header { display: flex; justify-content: space-between; align-items: center; font-size: 11px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .dp-name { color: var(--text-dim); font-family: 'Cinzel', serif; letter-spacing: 0.08em; text-transform: uppercase; }
  .dp-count { color: var(--gold-dim); }
  .dp-count.complete { color: var(--teal); }
  .hf-list { display: flex; flex-direction: column; gap: 3px; }
  .hf-item { display: flex; align-items: center; gap: 10px; padding: 5px 8px; border-radius: 3px; font-size: 13px; }
  .hf-item.done { background: rgba(76,168,168,0.07); }
  .hf-check-icon { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .hf-item.done .hf-check-icon { border-color: var(--teal); background: rgba(76,168,168,0.2); color: var(--teal); }
  .hf-item-name { flex: 1; color: var(--text-dim); }
  .hf-item.done .hf-item-name { color: var(--text); }
  .hf-item-pts { font-size: 11px; color: var(--text-dim); }
  .hf-item.done .hf-item-pts { color: var(--teal); }
  .hf-item-badges { display: flex; gap: 2px; align-items: center; }

  /* ACHIEVEMENTS PAGE */
  .dungeon-block {
    margin-bottom: 28px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
  }
  .dungeon-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.43;
    z-index: 0;
    border-radius: 8px;
  }
  .dungeon-inner {
    position: relative;
    z-index: 1;
    padding: 16px 16px 16px 16px;
  }
  .dungeon-title {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dungeon-title .bonus-tag {
    font-size: 12px;
    color: var(--teal);
    border: 1px solid var(--teal);
    padding: 1px 7px;
    border-radius: 20px;
    opacity: 0.7;
  }
  .hf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
  .hf-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 15px;
    cursor: pointer;
    transition: border-color 0.2s;
    user-select: none;
  }
  .hf-card:hover { border-color: var(--border-bright); }
  .hf-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .hf-card-title { font-weight: 400; font-size: 15px; flex: 1; }
  .hf-badges { display: flex; gap: 4px; flex-shrink: 0; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 4px; flex-shrink: 0;
  }
  .badge img { width: 18px; height: 18px; object-fit: contain; display: block; }
  .badge-pts {
    width: auto; height: 22px; padding: 0 6px;
    font-size: 10px; font-family: 'Cinzel', serif; letter-spacing: 0.05em;
    background: rgba(201,168,76,0.15); color: var(--gold); border-radius: 20px;
  }
  .hf-card-desc {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1.6;
    font-style: italic;
  }
  .hf-card.open .hf-card-desc { display: block; }
  .hf-card-title::after { content: ' \25B8'; font-size: 10px; color: var(--text-dim); opacity: 0.4; }
  .hf-card.open .hf-card-title::after { content: ' \25BE'; }

  /* ADMIN PAGE */
  .admin-gate { text-align: center; padding: 48px 24px; }
  .admin-gate h2 { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold); margin-bottom: 20px; }
  .admin-form { max-width: 320px; margin: 0 auto; }
  .field { margin-bottom: 14px; text-align: left; }
  .field label { display: block; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .field input, .field select {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--border-bright); }
  .btn {
    background: rgba(201,168,76,0.1);
    border: 1px solid var(--border-bright);
    color: var(--gold);
    padding: 10px 24px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    width: 100%;
  }
  .btn:hover { background: rgba(201,168,76,0.2); }
  .btn-danger { border-color: var(--red); color: var(--red); background: rgba(201,76,76,0.05); }
  .btn-danger:hover { background: rgba(201,76,76,0.15); }

  .admin-panel { display: none; }
  .admin-panel.visible { display: block; }

  .admin-toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .admin-toolbar select {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    border-radius: 4px;
    flex: 1;
    min-width: 160px;
  }
  .admin-toolbar select:focus { outline: none; border-color: var(--border-bright); }

  .admin-dungeon { margin-bottom: 24px; }
  .admin-dungeon-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dim);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .admin-hf-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .admin-hf-row:last-child { border-bottom: none; }
  .admin-hf-check {
    width: 20px; height: 20px;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    background: var(--bg2);
  }
  .admin-hf-check.checked {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
  }
  .admin-hf-check.checked::after {
    content: '✓';
    color: var(--gold);
    font-size: 13px;
    line-height: 1;
  }
  .admin-hf-info { flex: 1; }
  .admin-hf-name { font-size: 15px; }
  .admin-hf-meta { font-size: 12px; color: var(--text-dim); }
  .save-indicator {
    font-size: 12px;
    color: var(--teal);
    opacity: 0;
    transition: opacity 0.3s;
    font-style: italic;
  }
  .save-indicator.show { opacity: 1; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);
    border: 1px solid var(--border-bright);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 4px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }

  .help-link {
  display: block;
  padding: 8px 10px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 14px;
  border-radius: 4px;
  transition: all 0.2s;
}

.help-link:hover {
  background: var(--bg3);
  color: var(--text);
}

  /* RULES PAGE */
  .rules-page { max-width: 680px; margin: 0 auto; }
  .rules-section { margin-bottom: 32px; }
  .rules-section-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-dim);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .rules-list { display: flex; flex-direction: column; gap: 8px; }
  .rules-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 12px 16px;
    background: var(--bg2);
    border-radius: 6px;
    border-left: 2px solid var(--border);
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
  }
  .rules-item.highlight { border-left-color: var(--gold); background: rgba(201,168,76,0.05); }
  .rules-item.info { border-left-color: var(--teal); }
  .rules-icon { flex-shrink: 0; width: 18px; height: 18px; margin-top: 3px; opacity: 0.8; }
  .rules-icon img { width: 100%; height: 100%; object-fit: contain; }
  .rules-conditions { display: flex; gap: 5px; flex-shrink: 0; margin-top: 3px; }
  .rules-conditions img { width: 18px; height: 18px; object-fit: contain; opacity: 0.8; }

  /* SECRET HF */
  .secret-section {
    margin-top: 40px;
    margin-bottom: 28px;
  }
  .secret-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #b8a0f0;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(155,127,234,0.25);
    margin-bottom: 14px;
  }
  .secret-card {
    background: rgba(155,127,234,0.08);
    border: 1px solid rgba(155,127,234,0.4);
    border-radius: 4px;
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .secret-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgba(155,127,234,0.025) 8px,
      rgba(155,127,234,0.025) 16px
    );
    pointer-events: none;
  }
  .secret-card:hover { border-color: rgba(155,127,234,0.45); background: rgba(155,127,234,0.07); }
  .secret-card-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .secret-card-title {
    font-size: 15px;
    color: #b8a0f0;
    font-style: italic;
    letter-spacing: 0.05em;
  }
  .secret-card-title::after { content: ' \25B8'; font-size: 10px; opacity: 0.4; }
  .secret-card.open .secret-card-title::after { content: ' \25BE'; }
  .secret-card-desc {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(155,127,234,0.15);
    color: #a090d8;
    font-size: 14px;
    line-height: 1.7;
    font-style: italic;
    letter-spacing: 0.03em;
  }
  .secret-card.open .secret-card-desc { display: block; }
  .secret-coming-soon {
    color: #a090d8;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-size: 12px;
    font-family: 'Cinzel', serif;
  }

  /* LOADING */
  .loading { text-align: center; padding: 48px; color: var(--text-dim); font-style: italic; }

  /* RESPONSIVE MOBILE */
  @media (max-width: 640px) {

    /* Header compact */
    header { padding: 24px 16px 20px; }
    .event-title { font-size: clamp(18px, 6vw, 28px); }
    .event-subtitle { font-size: 12px; margin-top: 4px; }
    .social-links { gap: 8px; margin-top: 12px; }
    .social-link { padding: 5px 10px; font-size: 11px; }

    /* Nav : wrap en 2 lignes propres */
    nav {
      padding: 10px 12px;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-start;
    }
    .tab {
      font-size: 11px;
      padding: 6px 12px;
      letter-spacing: 0.08em;
    }
    /* Le groupe lang+aide reste à droite sur la même ligne */
    nav > div { margin-left: auto; }

    /* Main padding réduit */
    main { padding: 16px 12px 48px; }

    /* Leaderboard : 3 colonnes sur mobile (rang + nom + total) */
    .lb-header, .lb-row {
      grid-template-columns: 32px 1fr 52px;
      gap: 8px;
      padding: 10px 10px;
    }
    .lb-header .col-base, .lb-header .col-bonus, .lb-header .col-hf,
    .lb-row .score-base, .lb-row .score-bonus, .lb-row .hf-count { display: none; }
    .lb-header { font-size: 11px; }
    .player-name { font-size: 15px; }
    .score-total { font-size: 16px; }

    /* Détail joueur : 1 colonne au lieu de 2 */
    .lb-detail { padding: 12px 8px 16px 8px; }
    .lb-detail > div { grid-template-columns: 1fr !important; gap: 0 !important; }
    .dungeon-section { margin-bottom: 10px; }

    /* Hauts-faits : 1 colonne */
    .hf-grid { grid-template-columns: 1fr; }
    .dungeon-title { font-size: 13px; flex-wrap: wrap; }
    .hf-card { font-size: 14px; }
    .hf-card-title { font-size: 14px; }
    .hf-card-desc { font-size: 14px; }

    /* Règles */
    .rules-page { padding: 0; }
    .rules-item { font-size: 14px; padding: 10px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="event-title" id="event-title">Gloire à la Compagnie I</div>
  <div class="event-subtitle" id="header-subtitle">Du 21/04 au 17/05 &nbsp;·&nbsp; Classement en direct</div>
  <div class="event-subtitle" id="header-organiser">Organisé par Pouf</div>
  <div class="social-links">
    <a href="https://www.twitch.tv/pouf_hgaming" target="_blank" rel="noopener" class="social-link twitch">
      <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
      </svg>
      Twitch
    </a>

function toast(msg, isError=false) {

  el.textContent = msg;

  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.className = 'toast', 3000);
}

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');

// ---- SUPABASE FETCH ----
async function sbFetch(path, key, opts={}) {
  const url = (SUPABASE_URL === 'REMPLACE_PAR_TON_URL' ? adminUrl : SUPABASE_URL) + path;
  const apiKey = key || SUPABASE_ANON_KEY;
  const res = await fetch(url, {
    headers: {
      'apikey': apiKey,
      'Authorization': 'Bearer ' + apiKey,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
      ...opts.headers
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  if (res.status === 204) return null;
  return res.json();
}

// ---- SCORE CALCULATION (côté client) ----
function computeScores(players, completions) {
  // completions: [{player_id, achievement_id}]
  const byPlayer = {};
  players.forEach(p => byPlayer[p.id] = new Set());
  completions.forEach(c => {
    if (byPlayer[c.player_id]) byPlayer[c.player_id].add(c.achievement_id);
  });

  return players.map(p => {
    const done = byPlayer[p.id];
    let base = 0;
    done.forEach(aid => {
      const a = ACHIEVEMENTS.find(x => x.id === aid);
      if (a) base += a.points;
    });
    // Bonus par donjon
    let bonus = 0;
    DUNGEONS_ORDER.forEach(d => {
      const dungeonHFs = ACHIEVEMENTS.filter(a => a.dungeon === d);
      if (dungeonHFs.every(a => done.has(a.id))) bonus += 5;
    });
    return {
      id: p.id,
      name: p.name,
      base,
      bonus,
      total: base + bonus,
      hf_count: done.size,
      done
    };
  }).sort((a, b) => b.total - a.total);
}

let lbData = null;

async function loadLeaderboard() {
  if (SUPABASE_URL === 'REMPLACE_PAR_TON_URL') {
    document.getElementById('lb-content').innerHTML = '<div class="loading">Configure ton URL Supabase dans le fichier HTML pour voir les données en direct.</div>';

  } catch(e) {

function renderLeaderboard(scores) {
  const rankIcons = ['I', 'II', 'III'];
  let html = `<div class="lb-header">
    <div></div>
    <div>${t('lb.col.player')}</div>
    <div class="col-base" style="text-align:right">${t('lb.col.base')}</div>
    <div class="col-bonus" style="text-align:right">${t('lb.col.bonus')}</div>
    <div class="col-hf" style="text-align:right">${t('lb.col.hf')}</div>
    <div style="text-align:right">${t('lb.col.total')}</div>
  </div>`;

  // Rang dense : 1,1,1,2,3,4,4,4... (saute les 0 pts)
  let nextRank = 1;
  scores.forEach((s, i) => {
    if (s.total === 0) {
      s._rank = i + 1;
    } else if (i === 0 || s.total !== scores[i-1].total) {
      s._rank = nextRank;
      nextRank++;
    } else {
      s._rank = scores[i-1]._rank; // égalité → même rang, nextRank n'avance pas
    }
  });

  scores.forEach((s, i) => {
    const rank = s._rank;
    // Style visuel : on colore les 3 premières positions distinctes
    const topRanks = [...new Set(scores.filter(x => x.total > 0).map(x => x._rank))].slice(0, 3);
    const visualRank = topRanks.indexOf(rank); // 0, 1, 2 ou -1
    const rankClass = visualRank >= 0 ? `rank-${visualRank + 1}` : '';

    let rankLabel;
    if (s.total === 0) {
      rankLabel = `<span style="font-size:12px">${i + 1}</span>`;
    } else if (visualRank >= 0 && rank <= 3) {
      rankLabel = `<span style="font-style:italic;font-size:11px">${rankIcons[rank - 1] || rank}</span>`;
    } else {
      rankLabel = `<span style="font-size:12px">${rank}</span>`;
    }

    let detailHtml = '<div class="lb-detail"><div style="display:grid;grid-template-columns:1fr 1fr;gap:0 28px">';
    DUNGEONS_ORDER.forEach(d => {
      const dHFs = ACHIEVEMENTS.filter(a => a.dungeon === d);
      const dDone = dHFs.filter(a => s.done.has(a.id)).length;
      const complete = dDone === dHFs.length;
      detailHtml += `<div class="dungeon-section">
        <div class="dp-header">
          <span class="dp-name">${t(d)}</span>
          <span class="dp-count ${complete ? 'complete' : ''}">${dDone}/${dHFs.length}${complete ? ' · +5pts' : ''}</span>
        </div>
        <div class="hf-list">`;
      dHFs.forEach(a => {
        const done = s.done.has(a.id);
        const title = (currentLang === 'en' && a.title_en) ? a.title_en : a.title;
        detailHtml += `<div class="hf-item ${done ? 'done' : ''}">
          <div class="hf-check-icon">${done ? '✓' : ''}</div>
          <span class="hf-item-name">${title}</span>
          <div class="hf-item-badges">${renderBadges(a)}</div>
          <span class="hf-item-pts">${done ? '+' + a.points : a.points} pts</span>
        </div>`;
      });
      detailHtml += '</div></div>';
    });
    detailHtml += '</div></div>';

    html += `<div class="lb-row ${rankClass}" onclick="this.classList.toggle('open')">
      <div class="rank-num">${rankLabel}</div>
      <div class="player-name">${s.name}</div>
      <div class="score-base col-base">${s.base}</div>
      <div class="score-bonus col-bonus">${s.bonus > 0 ? '+'+s.bonus : '—'}</div>
      <div class="hf-count col-hf">${s.hf_count}</div>
      <div class="score-total">${s.total}</div>
      ${detailHtml}
    </div>`;
  });

  document.getElementById('lb-content').innerHTML = html;
}

let adminUrl = '';
let adminKey = '';
let adminPlayers = [];
let adminCurrentPlayer = null;
let adminCurrentDone = new Set();

function adminLogin() {
  adminUrl = document.getElementById('input-url').value.trim().replace(/\/$/, '');
  adminKey = document.getElementById('input-key').value.trim();
  if (!adminUrl || !adminKey) { toast('Remplis les deux champs', true); return; }
  loadAdminData();
}

async function loadAdminData() {
  try {
    adminPlayers = await sbFetch('/rest/v1/players?select=id,name&order=name', adminKey);
    const sel = document.getElementById('admin-player-select');
    sel.innerHTML = '<option value="">— Choisir un joueur —</option>';
    adminPlayers.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      sel.appendChild(opt);
    });
    document.getElementById('admin-gate').style.display = 'none';
    document.getElementById('admin-panel').classList.add('visible');
    toast('Connecté !');
  } catch(e) {
    toast('Erreur de connexion. Vérifie tes clés.', true);
  }
}

async function loadAdminPlayer() {
  const playerId = parseInt(document.getElementById('admin-player-select').value);
  if (!playerId) { document.getElementById('admin-hf-list').innerHTML = ''; return; }
  adminCurrentPlayer = playerId;

  try {
    const completions = await sbFetch(`/rest/v1/player_achievements?player_id=eq.${playerId}&select=achievement_id`, adminKey);
    adminCurrentDone = new Set(completions.map(c => c.achievement_id));
    renderAdminHFs();
  } catch(e) {
    toast('Erreur de chargement du joueur', true);
  }
}

function renderAdminHFs() {
  let html = '';
  DUNGEONS_ORDER.forEach(d => {
    const hfs = ACHIEVEMENTS.filter(a => a.dungeon === d);
    html += `<div class="admin-dungeon">
      <div class="admin-dungeon-title">${d}</div>`;
    hfs.forEach(a => {
      const checked = adminCurrentDone.has(a.id);
      html += `<div class="admin-hf-row">
        <div class="admin-hf-check ${checked ? 'checked' : ''}" onclick="toggleHF(${a.id}, this)"></div>
        <div class="admin-hf-info">
          <div class="admin-hf-name">${a.title} ${a.hard ? '⭐' : ''} ${a.personal ? '👤' : ''}</div>
          <div class="admin-hf-meta">${a.points} pts</div>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('admin-hf-list').innerHTML = html;
}

async function toggleHF(achievementId, el) {
  const isChecked = el.classList.contains('checked');
  el.style.pointerEvents = 'none';

  try {
    if (isChecked) {
      // Décocher
      await sbFetch(
        `/rest/v1/player_achievements?player_id=eq.${adminCurrentPlayer}&achievement_id=eq.${achievementId}`,
        adminKey,
        { method: 'DELETE', prefer: 'return=minimal' }
      );
      el.classList.remove('checked');
      adminCurrentDone.delete(achievementId);
    } else {
      // Cocher
      await sbFetch('/rest/v1/player_achievements', adminKey, {
        method: 'POST',
        prefer: 'return=minimal',
        body: { player_id: adminCurrentPlayer, achievement_id: achievementId }
      });
      el.classList.add('checked');
      adminCurrentDone.add(achievementId);
    }
    const ind = document.getElementById('save-indicator');
    ind.classList.add('show');
    clearTimeout(ind._t);
    ind._t = setTimeout(() => ind.classList.remove('show'), 2000);
  } catch(e) {
    toast('Erreur lors de la mise à jour', true);
  }
  el.style.pointerEvents = '';
}

}

let currentLang = 'fr';

function t(key) {
  const entry = TRANSLATIONS[key];
  if (!entry) return key;
  return entry[currentLang] || entry.fr || key;
}

function applyLangToStaticElements() {
  document.getElementById('header-subtitle').innerHTML = t('header.subtitle');
  document.getElementById('header-organiser').textContent = t('header.organiser');
  document.getElementById('tab-leaderboard').textContent = t('nav.leaderboard');
  document.getElementById('tab-achievements').textContent = t('nav.achievements');
  document.getElementById('tab-rules').textContent = t('nav.rules');
  document.getElementById('help-btn').textContent = t('nav.help');
  document.getElementById('event-title').textContent = t('header.event-title');
  document.getElementById('joiningform').textContent = t('nav.joiningform');
  document.getElementById('feedbackform').textContent = t('nav.feedbackform');
  document.getElementById('lang-btn').textContent = currentLang.toUpperCase();
  document.documentElement.lang = currentLang;
}

function toggleLang() {
  currentLang = currentLang === 'fr' ? 'en' : 'fr';
  applyLangToStaticElements();
  renderAchievements();
  if (lbData) renderLeaderboard(lbData);
  if (document.getElementById('page-rules').classList.contains('active')) renderRules();
}

function toggleHelpMenu() {
  const menu = document.getElementById('help-menu');
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

// Fermer si clic ailleurs
document.addEventListener('click', function(e) {
  const menu = document.getElementById('help-menu');
  const btn = document.getElementById('help-btn');
  if (!menu.contains(e.target) && e.target !== btn) {
    menu.style.display = 'none';
  }
});

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'leaderboard') loadLeaderboard();
  if (id === 'achievements') renderAchievements();
  if (id === 'rules') renderRules();
}

// ---- INIT ----
applyLangToStaticElements();
loadLeaderboard();
renderAchievements();
